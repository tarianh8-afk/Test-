<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAX OWNS ME </title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#ff7a18;
  --yellow:#ffd54a;
  --bg:#0f0b06;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:white;
  overflow-x:hidden;
}

/* PARTICLE CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* WRAPPER */
.wrapper{
  max-width:800px;
  margin:auto;
  padding:80px 20px 100px;
}

/* FLOATING HEADER CARD */
.header{
  padding:35px;
  border-radius:24px;
  background:rgba(255,122,24,0.07);
  border:1px solid rgba(255,122,24,0.25);
  margin-bottom:45px;
  animation:float 6s ease-in-out infinite;
  backdrop-filter: blur(6px);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

.header-inner{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:30px;
}

.title-area{
  display:flex;
  align-items:center;
  gap:18px;
}

h1{
  margin:0;
  font-size:38px;
  line-height:1.1;
}

.timer{
  margin-top:10px;
  font-size:20px;
  font-weight:600;
  color:var(--yellow);
}

/* STATUS DOT (Water Ripple) */
.status-dot{
  width:18px;
  height:18px;
  border-radius:50%;
  background:var(--orange);
  position:relative;
  box-shadow:0 0 15px var(--orange);
}
.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:inherit;
  animation:ripple 2.5s ease-out infinite;
}
@keyframes ripple{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2.8);opacity:0}
  100%{opacity:0}
}

/* BUTTONS */
.button-group{
  display:flex;
  gap:14px;
}

.btn{
  background:transparent;
  border:1px solid var(--orange);
  color:var(--orange);
  padding:10px 24px;
  border-radius:50px;
  cursor:pointer;
  font-weight:600;
  transition:.25s ease;
}

.btn:hover{
  background:var(--orange);
  color:black;
  box-shadow:0 0 20px rgba(255,122,24,.7);
  transform:translateY(-2px);
}

/* CARDS */
.card{
  padding:24px;
  border-radius:20px;
  background:rgba(255,122,24,0.06);
  border:1px solid rgba(255,122,24,0.2);
  margin-bottom:25px;
  transition:.3s;
}

.card:hover{
  box-shadow:0 0 25px rgba(255,122,24,.35);
  transform:translateY(-3px);
}

.card-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:16px;
  align-items:center;
}

.badge{
  font-size:12px;
  padding:6px 14px;
  border-radius:40px;
  border:1px solid var(--orange);
  color:var(--orange);
}

/* PROGRESS BAR */
.progress{
  height:10px;
  background:rgba(255,255,255,0.05);
  border-radius:40px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--orange),var(--yellow));
  border-radius:40px;
  position:relative;
  overflow:hidden;
  transition:width .6s ease;
}

/* Shine clipped inside */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:30%;
  height:100%;
  background:linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.8) 50%,
    rgba(255,255,255,0) 100%
  );
  animation:shine 4s linear infinite;
}

@keyframes shine{
  from{left:-40%;}
  to{left:140%;}
}

.percent{
  margin-top:10px;
  font-size:14px;
  color:#ddd;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:flex;
  align-items:center;
  justify-content:center;
  visibility:hidden;
  opacity:0;
  transition:.3s;
}

.modal.active{
  visibility:visible;
  opacity:1;
}

.modal-box{
  width:90%;
  max-width:420px;
  background:#1a120a;
  padding:30px;
  border-radius:20px;
  border:1px solid var(--orange);
}

.modal-box input{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:#222;
  border:1px solid #444;
  color:white;
  border-radius:8px;
}

.modal-box button{
  width:100%;
  padding:10px;
  background:var(--orange);
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
}

/* MOBILE */
@media (max-width:650px){
  .header-inner{
    flex-direction:column;
    align-items:flex-start;
  }

  .button-group{
    width:100%;
  }

  .button-group .btn{
    flex:1;
  }
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="header">
    <div class="header-inner">
      
      <div class="title-area">
        <div class="status-dot"></div>
        <div>
          <h1>Custom Commands</h1>
          <div class="timer" id="timer"></div>
        </div>
      </div>

      <div class="button-group">
        <button class="btn" onclick="joinDiscord()">Discord</button>
        <button class="btn" onclick="openModal()">Admin</button>
      </div>

    </div>
  </div>

  <div id="services"></div>
</div>

<div class="modal" id="modal">
  <div class="modal-box" id="modalContent">
    <h2 style="color:var(--orange)">Admin Access</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<script>
const PASSWORD="nova123";
const DISCORD_LINK="https://discord.gg/XaZSGVFvzV";

function joinDiscord(){
  window.open(DISCORD_LINK,"_blank");
}

/* LOAD SAVED DATA */
let services = JSON.parse(localStorage.getItem("servicesData")) || [
  {name:"Discord",percent:100,badge:"operational"},
  {name:"website",percent:80,badge:"beta"},
  {name:"v3 cmdrs",percent:1,badge:"down"},
  {name:"Beta Commands",percent:14,badge:"Beta"}
];

function saveData(){
  localStorage.setItem("servicesData", JSON.stringify(services));
}

function render(){
  const container=document.getElementById("services");
  container.innerHTML="";
  services.forEach((s,i)=>{
    container.innerHTML+=`
    <div class="card">
      <div class="card-top">
        <div>${s.name}</div>
        <div class="badge">${s.badge}</div>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:${s.percent}%"></div>
      </div>
      <div class="percent">${s.percent}%</div>
    </div>`;
  });
}
render();

/* ADMIN */
function openModal(){
  document.getElementById("modal").classList.add("active");
}
function login(){
  if(document.getElementById("pass").value===PASSWORD){
    loadAdminPanel();
  }
}
function loadAdminPanel(){
  const box=document.getElementById("modalContent");
  box.innerHTML="<h2 style='color:var(--orange)'>Admin Panel</h2>";
  services.forEach((s,i)=>{
    box.innerHTML+=`
      <strong>${s.name}</strong>
      <input type="number" value="${s.percent}" onchange="updatePercent(${i},this.value)">
      <input type="text" value="${s.badge}" onchange="updateBadge(${i},this.value)">
    `;
  });
  box.innerHTML+=`<button onclick="closeModal()">Close</button>`;
}
function updatePercent(i,val){
  services[i].percent=val;
  saveData();
  render();
}
function updateBadge(i,val){
  services[i].badge=val;
  saveData();
  render();
}
function closeModal(){
  document.getElementById("modal").classList.remove("active");
}

/* TIMER */
const start=new Date("2026-01-01T00:00:00Z");
setInterval(()=>{
  const diff=new Date()-start;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000)%24;
  const m=Math.floor(diff/60000)%60;
  const s=Math.floor(diff/1000)%60;
  document.getElementById("timer").textContent=
  `Established: ${d}d ${h}h ${m}m ${s}s`;
},1000);

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=innerWidth;
  canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

let particles=[];
for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-.5)*.5,
    dy:(Math.random()-.5)*.5
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(255,140,50,.7)";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
