<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Commands</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#ff7a18;
  --yellow:#ffd54a;
  --red:#ff4d4d;
  --white:#ffffff;
  --muted:#c9b38c;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f0b06;
  color:var(--white);
  overflow-x:hidden;
}

/* ================= PARTICLE BACKGROUND ================= */

canvas{
  position:fixed;
  inset:0;
  z-index:-2;
}

body::before{
  content:"";
  position:fixed;
  inset:-50%;
  background:
    radial-gradient(circle at 20% 30%, rgba(255,122,24,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,213,74,0.15), transparent 40%);
  animation:bgMove 20s ease-in-out infinite alternate;
  z-index:-1;
}

@keyframes bgMove{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(-5%,5%) scale(1.1);}
}

/* ================= LAYOUT ================= */

.wrapper{
  max-width:820px;
  margin:auto;
  padding:40px 18px 60px;
}

/* ================= FLOATING HEADER ================= */

.header{
  padding:26px;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:35px;
  animation:float 6s ease-in-out infinite;
  box-shadow:0 0 30px rgba(255,122,24,0.15);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.header-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.left-header{
  display:flex;
  align-items:center;
  gap:12px;
}

/* ================= WATER DROP STATUS DOT ================= */

.status-dot{
  position:relative;
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--orange);
  box-shadow:0 0 10px var(--orange);
}

.status-dot::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:var(--orange);
  animation:ripple 2.5s ease-out infinite;
  opacity:0.6;
}

@keyframes ripple{
  0%{transform:scale(1);opacity:0.6;}
  70%{transform:scale(2.8);opacity:0;}
  100%{transform:scale(2.8);opacity:0;}
}

/* ================= TEXT ================= */

h1{
  margin:0;
  font-size:22px;
  font-weight:600;
}

.admin-btn{
  padding:6px 14px;
  border-radius:40px;
  border:1px solid var(--orange);
  background:transparent;
  color:var(--orange);
  cursor:pointer;
  transition:.3s;
}

.admin-btn:hover{
  background:var(--orange);
  color:#000;
  box-shadow:0 0 15px var(--orange);
}

.timer{
  margin-top:12px;
  font-size:14px;
  color:var(--muted);
}

/* ================= CARDS ================= */

.card{
  padding:22px;
  border-radius:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:22px;
  transition:.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 25px rgba(255,122,24,0.2);
}

.card-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.badge{
  font-size:12px;
  padding:5px 14px;
  border-radius:50px;
  border:1px solid;
}

.badge.active{color:var(--orange);border-color:var(--orange)}
.badge.maintenance{color:var(--yellow);border-color:var(--yellow)}
.badge.offline{color:var(--red);border-color:var(--red)}
.badge.beta{color:white;border-color:white}

/* ================= PROGRESS ================= */

.progress{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:50px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:50px;
  background:linear-gradient(90deg,var(--orange),var(--yellow));
  position:relative;
  overflow:hidden;
  transition:width 1s ease;
}

.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-50%;
  width:40%;
  height:100%;
  background:linear-gradient(120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.8) 50%,
    rgba(255,255,255,0) 100%);
  animation:shine 5s ease-in-out infinite;
}

@keyframes shine{
  0%{left:-50%}
  100%{left:150%}
}

/* ================= ADMIN MODAL ================= */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.75);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:10;
}

.modal-content{
  background:#1a120a;
  padding:25px;
  border-radius:15px;
  width:90%;
  max-width:400px;
}

.modal input{
  width:100%;
  padding:8px;
  margin-bottom:10px;
}

.modal button{
  padding:8px 12px;
  margin-top:5px;
}

@media(max-width:480px){
  h1{font-size:19px}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="wrapper">
<div class="header">
  <div class="header-top">
    <div class="left-header">
      <div class="status-dot"></div>
      <h1>Custom Commands</h1>
    </div>
    <button class="admin-btn" onclick="openAdmin()">Admin</button>
  </div>
  <div class="timer" id="timer"></div>
</div>

<div id="services"></div>
</div>

<!-- ADMIN MODAL -->
<div class="modal" id="adminModal">
  <div class="modal-content">
    <div id="passwordSection">
      <h3>Enter Password</h3>
      <input type="password" id="passwordInput">
      <button onclick="checkPassword()">Login</button>
    </div>

    <div id="panelSection" style="display:none;">
      <h3>Admin Panel</h3>
      <div id="adminControls"></div>
      <button onclick="closeAdmin()">Close</button>
    </div>
  </div>
</div>

<script>

const PASSWORD="nova123";

let services=[
  {name:"Command Engine",percent:0,status:"offline",label:"Down"},
  {name:"Moderation Tools",percent:80,status:"active",label:"Operational"},
  {name:"Automation System",percent:55,status:"maintenance",label:"Updating"},
  {name:"Beta Commands",percent:35,status:"beta",label:"Beta"}
];

function render(){
  const container=document.getElementById("services");
  container.innerHTML="";
  services.forEach((service,i)=>{
    container.innerHTML+=`
    <div class="card">
      <div class="card-top">
        <div>${service.name}</div>
        <div class="badge ${service.status}">${service.label}</div>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:${service.percent}%"></div>
      </div>
      <div>${service.percent}%</div>
    </div>`;
  });
}
render();

/* TIMER */
const startDate=new Date("2026-01-01T00:00:00Z");
function updateTimer(){
  const now=new Date();
  const diff=now-startDate;
  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/(1000*60))%60);
  const s=Math.floor((diff/1000)%60);
  document.getElementById("timer").textContent=
  `Established: ${d}d ${h}h ${m}m ${s}s`;
}
setInterval(updateTimer,1000);
updateTimer();

/* ADMIN */
function openAdmin(){
  document.getElementById("adminModal").style.display="flex";
}
function closeAdmin(){
  document.getElementById("adminModal").style.display="none";
}
function checkPassword(){
  const input=document.getElementById("passwordInput").value;
  if(input===PASSWORD){
    document.getElementById("passwordSection").style.display="none";
    document.getElementById("panelSection").style.display="block";
    loadAdminControls();
  } else {
    alert("Wrong password");
  }
}
function loadAdminControls(){
  const container=document.getElementById("adminControls");
  container.innerHTML="";
  services.forEach((service,i)=>{
    container.innerHTML+=`
      <div>
        <strong>${service.name}</strong><br>
        Percent:
        <input type="number" value="${service.percent}" onchange="updatePercent(${i},this.value)"><br>
        Badge Name:
        <input type="text" value="${service.label}" onchange="updateLabel(${i},this.value)">
        <hr>
      </div>`;
  });
}
function updatePercent(i,value){
  services[i].percent=value;
  render();
}
function updateLabel(i,value){
  services[i].label=value;
  render();
}

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let particles=[];
let w,h;

function resize(){
  w=canvas.width=window.innerWidth;
  h=canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*2+1,
    dx:(Math.random()-0.5)*0.4,
    dy:(Math.random()-0.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="rgba(255,180,100,0.6)";
  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>w)p.dx*=-1;
    if(p.y<0||p.y>h)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
