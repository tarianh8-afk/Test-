<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Commands</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --orange:#ff7a18;
  --yellow:#ffd54a;
  --green:#22c55e;
  --red:#ff4d4d;
  --white:#ffffff;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:#0f0b06;
  color:white;
  overflow-x:hidden;
}

/* PARTICLE CANVAS */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* LAYOUT */
.wrapper{
  max-width:850px;
  margin:auto;
  padding:40px 20px 60px;
}

/* HEADER */
.header{
  padding:28px;
  border-radius:20px;
  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:35px;
  animation:float 6s ease-in-out infinite;
  box-shadow:0 0 40px rgba(255,122,24,0.15);
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.left{
  display:flex;
  align-items:center;
  gap:12px;
}

h1{margin:0;font-size:22px}

/* STATUS DOT */
.status-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--green);
  position:relative;
  box-shadow:0 0 12px var(--green);
}
.status-dot::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:inherit;
  animation:ripple 2.5s ease-out infinite;
}
@keyframes ripple{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2.5);opacity:0}
  100%{opacity:0}
}

.admin-btn{
  padding:6px 14px;
  border-radius:40px;
  border:1px solid var(--orange);
  background:transparent;
  color:var(--orange);
  cursor:pointer;
}

.timer{
  margin-top:12px;
  font-size:14px;
  opacity:.8;
}

/* CARDS */
.card{
  padding:22px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:20px;
  transition:.3s;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 30px rgba(255,122,24,.25);
}

.card-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:14px;
}

.badge{
  font-size:12px;
  padding:5px 14px;
  border-radius:40px;
  border:1px solid;
}
.active{color:var(--green);border-color:var(--green)}
.maintenance{color:var(--yellow);border-color:var(--yellow)}
.offline{color:var(--red);border-color:var(--red)}
.beta{color:white;border-color:white}

.progress{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:40px;
  overflow:hidden;
}
.progress-bar{
  height:100%;
  border-radius:40px;
  background:linear-gradient(90deg,var(--orange),var(--yellow));
  position:relative;
  transition:width 1.2s ease;
}
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-50%;
  width:40%;
  height:100%;
  background:linear-gradient(120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,.8) 50%,
    rgba(255,255,255,0) 100%);
  animation:shine 6s linear infinite;
}
@keyframes shine{
  from{left:-50%}
  to{left:150%}
}

/* SLIDE ADMIN PANEL */
.admin-panel{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100%;
  background:#1a120a;
  padding:25px;
  transition:.4s ease;
  overflow-y:auto;
  z-index:10;
  box-shadow:-10px 0 40px rgba(0,0,0,.6);
}
.admin-panel.open{right:0}

.admin-panel input, .admin-panel select{
  width:100%;
  margin-bottom:10px;
  padding:8px;
  background:#111;
  border:1px solid #333;
  color:white;
}

.lock-message{
  color:var(--red);
  font-size:14px;
}

@media(max-width:600px){
  .admin-panel{width:100%}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="wrapper">
  <div class="header">
    <div class="header-top">
      <div class="left">
        <div class="status-dot" id="statusDot"></div>
        <h1>Custom Commands</h1>
      </div>
      <button class="admin-btn" onclick="toggleAdmin()">Admin</button>
    </div>
    <div class="timer" id="timer"></div>
  </div>

  <div id="services"></div>
</div>

<div class="admin-panel" id="adminPanel">
  <h3>Admin Login</h3>
  <div id="loginSection">
    <input type="password" id="passwordInput" placeholder="Enter Password">
    <button onclick="checkPassword()">Login</button>
    <div class="lock-message" id="lockMessage"></div>
  </div>
  <div id="controlSection" style="display:none;"></div>
</div>

<script>
const PASSWORD="nova123";
let attempts=0;
let lockedUntil=0;

let services=JSON.parse(localStorage.getItem("services"))||[
  {name:"Command Engine",percent:0,status:"offline"},
  {name:"Moderation Tools",percent:85,status:"active"},
  {name:"Automation System",percent:60,status:"maintenance"}
];

function save(){localStorage.setItem("services",JSON.stringify(services));}

function render(){
  const container=document.getElementById("services");
  container.innerHTML="";
  services.forEach((s,i)=>{
    container.innerHTML+=`
    <div class="card">
      <div class="card-top">
        <div>${s.name}</div>
        <div class="badge ${s.status}">${s.status}</div>
      </div>
      <div class="progress">
        <div class="progress-bar" style="width:${s.percent}%"></div>
      </div>
      <div>${s.percent}%</div>
    </div>`;
  });
  updateStatusDot();
}

function updateStatusDot(){
  const dot=document.getElementById("statusDot");
  let color="var(--green)";
  if(services.some(s=>s.status==="offline")) color="var(--red)";
  else if(services.some(s=>s.status==="maintenance")) color="var(--yellow)";
  dot.style.background=color;
  dot.style.boxShadow=`0 0 12px ${color}`;
}

render();

/* TIMER */
const start=new Date("2026-01-01T00:00:00Z");
setInterval(()=>{
  const diff=new Date()-start;
  const d=Math.floor(diff/86400000);
  const h=Math.floor(diff/3600000)%24;
  const m=Math.floor(diff/60000)%60;
  const s=Math.floor(diff/1000)%60;
  document.getElementById("timer").textContent=
  `Established: ${d}d ${h}h ${m}m ${s}s`;
},1000);

/* ADMIN */
function toggleAdmin(){
  document.getElementById("adminPanel").classList.toggle("open");
}
function checkPassword(){
  if(Date.now()<lockedUntil){
    document.getElementById("lockMessage").textContent="Locked. Wait 30 seconds.";
    return;
  }
  if(document.getElementById("passwordInput").value===PASSWORD){
    document.getElementById("loginSection").style.display="none";
    loadControls();
  } else {
    attempts++;
    if(attempts>=5){
      lockedUntil=Date.now()+30000;
      attempts=0;
    }
    document.getElementById("lockMessage").textContent="Wrong password.";
  }
}

function loadControls(){
  const c=document.getElementById("controlSection");
  c.style.display="block";
  c.innerHTML="<h3>Service Controls</h3>";
  services.forEach((s,i)=>{
    c.innerHTML+=`
    <strong>${s.name}</strong>
    <input type="number" value="${s.percent}" onchange="updatePercent(${i},this.value)">
    <select onchange="updateStatus(${i},this.value)">
      <option value="active">active</option>
      <option value="maintenance">maintenance</option>
      <option value="offline">offline</option>
      <option value="beta">beta</option>
    </select>
    <button onclick="removeService(${i})">Remove</button>
    <hr>`;
  });
  c.innerHTML+=`
  <h3>Add Service</h3>
  <input type="text" id="newName" placeholder="Service Name">
  <button onclick="addService()">Add</button>`;
}

function updatePercent(i,v){services[i].percent=v;save();render();}
function updateStatus(i,v){services[i].status=v;save();render();}
function removeService(i){services.splice(i,1);save();render();loadControls();}
function addService(){
  const name=document.getElementById("newName").value;
  if(name){
    services.push({name,percent:0,status:"active"});
    save();render();loadControls();
  }
}

/* PARTICLES */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener("resize",resize);

let particles=[];
for(let i=0;i<50;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    dx:(Math.random()-.5)*.5,
    dy:(Math.random()-.5)*.5
  });
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{
    p.x+=p.dx;p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(255,180,100,.7)";
    ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
